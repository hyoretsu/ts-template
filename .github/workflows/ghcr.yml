name: Build and Publish Docker Images to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.list.outputs.services }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'packages/sql/**'
              - 'bun.lock'
              - 'package.json'
              - 'tsconfig.json'
              - '.github/workflows/ghcr.yml'
            frontend:
              - 'frontend/**'
              - 'bun.lock'
              - 'package.json'
              - 'tsconfig.json'
              - '.github/workflows/ghcr.yml'

      - name: Build service list
        id: list
        env:
          EVENT: ${{ github.event_name }}
          BACKEND_CHANGED: ${{ steps.filter.outputs.backend }}
          FRONTEND_CHANGED: ${{ steps.filter.outputs.frontend }}
        run: |
          services=()
          if [[ "$EVENT" == "workflow_dispatch" ]]; then
            services=(backend frontend)
          else
            [[ "$BACKEND_CHANGED" == "true" ]] && services+=(backend)
            [[ "$FRONTEND_CHANGED" == "true" ]] && services+=(frontend)
          fi
          json=$(printf '%s\n' "${services[@]}" | jq -R . | jq -sc .)
          echo "services=$json" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.service }} image
    needs: changes
    if: needs.changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.services) }}
        include:
          - service: backend
            dockerfile: backend/Dockerfile
            build_args: |
              NODE_ENV=production
          - service: frontend
            dockerfile: frontend/Dockerfile
            build_args: |
              NODE_ENV=production
              NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:3333' }}
              NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image metadata
        id: meta
        run: |
          IMAGE_NAME="$(echo "ghcr.io/${GITHUB_REPOSITORY}-${{ matrix.service }}" | tr '[:upper:]' '[:lower:]')"
          DATE_TAG="$(date -u +'%Y%m%d')"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "date_tag=${DATE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.date_tag }}
            ${{ steps.meta.outputs.image_name }}:latest
          build-args: ${{ matrix.build_args }}
          secrets: ${{ matrix.service == 'backend' && format('DATABASE_URL={0}', secrets.DATABASE_URL) || '' }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
